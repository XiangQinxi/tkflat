name: dark

styles:
  bg: "#0a0a0a"
  fg: "#fafafa"
  frame: "#171717"
  second_fg: "#c2c2c2"
  primary: "#e5e5e5"
  second: "#212121"
  muted: "#282828"
  accent: "#262626"
  border: "#3a3a3a"

widgets:
  Window:
    bg: "@bg"

  Button:
    bg: "@second"
    border: "@border"
    border_width: 1
    text: "@fg"

    hover:
      bg: '@muted'
      border_width: 2
    press:
      bg: '@muted'
      text: '@second_fg'
      border_width: 2

  Entry:
    bg: "@second"
    border: "@border"
    border_width: 1
    text: "@fg"

    hover:
      bg: "@muted"
      border: "@border"
    focus:
      bg: "@muted"
      border: "@border"
      text: "@fg"
      border_width: 3

  Frame:
    bg: "@frame"
    border: "@border"
    border_width: 1

  Text:
    bg: "@second"
    border: "@border"
    border_width: 1
    text: "@fg"

    hover:
      bg: "@muted"
      border: "@border"
    focus:
      bg: "@muted"
      border: "@border"
      text: "@fg"
      border_width: 3

  Label:
    text: "@fg"
